<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory Pro - Inteligentní Generátor</title>
    <style>
        :root { --p: #6366f1; }
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .preview-circle { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; display: inline-block; vertical-align: middle; margin-left: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #334155; border: 1px solid #475569; border-radius: 10px; color: white; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }
        #output { display: none; margin-top: 20px; background: #000; color: #10b981; padding: 15px; border-radius: 10px; font-family: monospace; white-space: pre-wrap; font-size: 12px; max-height: 400px; overflow-y: auto; }
        .loading { display: none; color: #38bdf8; text-align: center; margin: 10px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 AI Factory Pro</h1>
    <p>Navrhni si AI a já jí pomocí Groqu vygeneruji kód.</p>
    
    <label>Jméno tvé AI:</label>
    <input type="text" id="aiName" placeholder="Např. CyberBuddy">
    
    <label>Základní barva: <div id="colorPreview" class="preview-circle" style="background: #6366f1;"></div></label>
    <input type="color" id="aiColor" value="#6366f1" oninput="document.getElementById('colorPreview').style.background = this.value">
    
    <label>Jak má stránka vypadat? (Styl, tvary, atmosféra):</label>
    <textarea id="aiStyle" placeholder="Např: Moderní tmavý vzhled, skleněné efekty (glassmorphism), neonové písmo a hodně kulaté rohy..."></textarea>
    
    <button id="genBtn" onclick="generateSmartAI()">Vytvořit AI pomocí Groqu</button>
    
    <div id="loader" class="loading">Groq právě navrhuje tvou stránku... počkej chvilku...</div>
    <div id="output"></div>
</div>

<script>
async function generateSmartAI() {
    const name = document.getElementById('aiName').value || 'AI Bot';
    const color = document.getElementById('aiColor').value;
    const styleDesc = document.getElementById('aiStyle').value;
    const btn = document.getElementById('genBtn');
    const loader = document.getElementById('loader');
    const output = document.getElementById('output');
    
    const apiKey = "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";

    btn.disabled = true;
    loader.style.display = 'block';
    output.style.display = 'none';

    // Teď požádáme Groq, aby nám napsal CSS a HTML podle přání uživatele
    const prompt = `Vytvoř kompletní HTML kód pro jednu stránku s chatovacím rozhraním pro AI jménem "${name}". 
    Hlavní barva musí být: ${color}. 
    Uživatel si přeje tento styl: ${styleDesc}.
    Kód musí obsahovat:
    1. Moderní CSS v <style> tagu.
    2. HTML strukturu s oknem pro zprávy a vstupním polem.
    3. JavaScript, který pošle zprávu na Groq API (model llama3-8b-8192) a zobrazí odpověď. 
    DŮLEŽITÉ: Do kódu vlož tenhle API klíč: ${apiKey}. 
    Kód musí fungovat i přes https://corsproxy.io/? před URL Groqu.
    Vrať POUZE čistý HTML kód, nic jiného.`;

    try {
        const response = await fetch("https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama3-70b-8192", // Použijeme silnější model pro generování kódu
                messages: [{role: "user", content: prompt}],
                temperature: 0.7
            })
        });

        const data = await response.json();
        let finalCode = data.choices[0].message.content;
        
        // Odstranění případných markdown značek ```html
        finalCode = finalCode.replace(/```html/g, "").replace(/```/g, "").trim();

        output.textContent = finalCode;
        output.style.display = 'block';
    } catch (e) {
        alert("Chyba při generování: " + e.message);
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
