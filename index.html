<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory - Generátor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; display: flex; justify-content: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 500px; width: 100%; }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; background: #0ea5e9; color: white; border: none; padding: 14px; margin-top: 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0284c7; }
        textarea { width: 100%; height: 150px; margin-top: 20px; background: #000; color: #10b981; border-radius: 8px; display: none; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .success { display: none; color: #10b981; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>🤖 AI Factory</h1>
    <p>Vytvoř si vlastní AI chat na jedno kliknutí.</p>
    
    <label>Jméno tvé AI</label>
    <input type="text" id="aiName" placeholder="Např. Matrix Bot">
    
    <label>Barva rozhraní</label>
    <input type="color" id="aiColor" value="#38bdf8">
    
    <button onclick="generateAI()">Vygenerovat kód pro GitHub</button>
    
    <div id="status" class="success">✓ Kód vygenerován! Zkopíruj ho níže.</div>
    <textarea id="resultCode"></textarea>
</div>

<script>
function generateAI() {
    const name = document.getElementById('aiName').value || 'Moje AI';
    const color = document.getElementById('aiColor').value;
    const apiKey = "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"; // Tvůj klíč

    const template = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>${name} Chat</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat { width: 400px; height: 600px; background: #222; border-radius: 15px; display: flex; flex-direction: column; border: 2px solid ${color}; overflow: hidden; }
        #header { background: ${color}; padding: 15px; text-align: center; font-weight: bold; color: #000; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: ${color}; color: #000; }
        .ai { align-self: flex-start; background: #333; color: white; }
        #input-box { display: flex; padding: 10px; background: #222; border-top: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; border-radius: 5px; background: #333; color: white; outline: none; }
        button { margin-left: 10px; background: ${color}; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="header">${name}</div>
        <div id="messages"></div>
        <div id="input-box">
            <input type="text" id="userInput" placeholder="Zeptej se mě na něco...">
            <button onclick="askAI()">Odeslat</button>
        </div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('messages');
            const text = input.value;
            if(!text) return;

            box.innerHTML += '<div class="msg user">' + text + '</div>';
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer ${apiKey}",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: text}]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                box.innerHTML += '<div class="msg ai">' + aiText + '</div>';
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += '<div class="msg ai">Chyba: Nepodařilo se spojit s mozkem AI.</div>';
            }
        }
    <\/script>
</body>
</html>`;

    document.getElementById('resultCode').value = template.trim();
    document.getElementById('resultCode').style.display = 'block';
    document.getElementById('status').style.display = 'block';
}
</script>

</body>
</html>
